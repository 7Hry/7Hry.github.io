<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuário ou senha incorreta</title>
</head>
<body>
    <style>
        body{
            background-color: rgb(177, 177, 177);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }
        h1{
            color: black;
            font-family: 'Courier New', Courier, monospace;
            margin-bottom: 5px;
            text-align: center;
            max-width: 600px;
        }
        hr{
            background-color: rgb(0, 0, 0);
            border: none;
            height: 2px;
            width: 480px;
            margin-bottom: 20px;
        }
        button{
            padding: 20px 80px;
            cursor: pointer;
            background-color: rgb(219, 219, 219);
            border: 2px solid rgb(0, 0, 0);
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        button:hover{
            background-color: rgb(240, 240, 240);
            transform: scale(1.05);
        }
        img{
            height: 100px;
            margin-bottom: 15px;
        }
        .login-fields {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 280px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            background-color: rgb(240, 240, 240);
            border: 2px solid rgb(0, 0, 0);
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            color: black;
            outline: none;
            transition: all 0.3s ease;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            background-color: rgb(255, 255, 255);
            border-color: rgb(80, 80, 80);
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.3);
        }
        .error-message {
            color: rgb(180, 0, 0);
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }
    </style>

    <h1>Usuário ou senha foram digitados incorretamente.</h1>
    <hr>
    <img src="triste.png" alt="Usuário">

    <div class="login-fields">
    </div>

    <a href="index.html"><button type="button" id="tryAgainBtn">Tente novamente</button></a>

    <script>
        const loginBtn = document.getElementById('tryAgainBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        loginBtn.addEventListener('click', () => {
            const user = usernameInput.value.trim();
            const pass = passwordInput.value.trim();
            
            console.log('Tentativa de login na página de erro → Usuário:', user, '| Senha:', pass);
            
            if (user && pass) {
                window.location.href = "index.html";
            } else {
                alert("Por favor, preencha usuário e senha antes de tentar novamente.");
            }
        });

        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });
    </script>
</body>
</html>
