<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Clube de Tiro</title>
</head>
<body>
    <style>
        body{
            background-color: rgb(177, 177, 177);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        h1{
            color: black;
            font-family: 'Courier New', Courier, monospace;
            margin-bottom: 5px;
        }
        hr{
            background-color: rgb(0, 0, 0);
            border: none;
            height: 2px;
            width: 200px;
            margin-bottom: 20px;
        }
        button{
            padding: 8px 20px;
            cursor: pointer;
            background-color: hwb(240, 240, 240);
            border: 2px solid rgb(0, 0, 0);
        }
        img{
            height: 100px;
            margin-bottom: 15px;
        }
        img {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100px;
        }

        .login-fields {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 280px;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            background-color: rgb(240, 240, 240);
            border: 2px solid rgb(0, 0, 0);
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            color: black;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            background-color: rgb(255, 255, 255);
            border-color: rgb(80, 80, 80);
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.3);
        }
    </style>

    <h1 align="center">Faça o login</h1>
    <hr>
    <img src="usuario.png" alt="">

    <div class="login-fields">
        <input type="text" placeholder="Usuário" id="username" autocomplete="username">
        <input type="password" placeholder="Senha" id="password" autocomplete="current-password">
    </div>

    <a href="erro.html"><button type="button">Logar</button></a>

    <script>
        const loginBtn = document.querySelector('button');
        loginBtn.addEventListener('click', () => {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            console.log('Tentativa de login → Usuário:', user, '| Senha:', pass);
        });
    </script>
</body>
</html>
